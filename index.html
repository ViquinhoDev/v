<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viquinho System</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: monospace;
      color: #0f0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo {
      position: relative;
      width: 200px;
      height: 200px;
      border: 4px solid #0f0;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo span {
      font-size: 150px;
      font-weight: 300;
      line-height: 0.8;
      color: #0f0;
    }

    .title {
      font-size: 32px;
      color: #0f0;
      text-shadow: 0 0 10px #0f0;
      letter-spacing: 2px;
    }

    .loading {
      font-size: 18px;
      color: #0f0;
      text-shadow: 0 0 5px #0f0;
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    .fade-out {
      animation: fadeOut 0.5s ease-out forwards;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">
      <span>V</span>
    </div>
    <div class="title">Viquinho System</div>
    <div class="loading" id="loading">loading...</div>
  </div>

  <script>
    setTimeout(() => {
      const loadingElement = document.getElementById('loading');
      loadingElement.classList.add('fade-out');
      
      setTimeout(() => {
        window.location.href = 'system.html';
      }, 500);
    }, 4000);
  </script>

</body>

</html>
